syntax = "proto3";

package fleetops;

message DispatchCommandRequest {
  string robot_id = 1;
  string cmd = 2;
  string type = 3;
  int64 deadline_ms = 4;
  string idempotency_key = 5;
  string requested_by = 6;
}

message DispatchCommandResponse {
  string command_id = 1;
  string state = 2;
  bool deduplicated = 3;
  string message = 4;
}

message GetCommandStatusRequest {
  string command_id = 1;
}

message CommandStatus {
  string command_id = 1;
  string target = 2;
  string cmd = 3;
  string type = 4;
  string state = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
  string source = 8;
  string error = 9;
  string result_output = 10;
  string ack_type = 11;
}

message GetCommandStatusResponse {
  bool found = 1;
  CommandStatus status = 2;
}

message ListRobotsRequest {}

message RobotState {
  string robot_id = 1;
  string status = 2;
  string last_task = 3;
  string last_task_output = 4;
  string last_command_id = 5;
  int64 last_seen = 6;
  double battery_percent = 7;
  double cpu_percent = 8;
  double memory_percent = 9;
  int64 uptime_sec = 10;
}

message ListRobotsResponse {
  repeated RobotState robots = 1;
}

message StreamRobotStatesRequest {
  int32 interval_ms = 1;
}

service FleetOps {
  rpc DispatchCommand(DispatchCommandRequest) returns (DispatchCommandResponse);
  rpc GetCommandStatus(GetCommandStatusRequest) returns (GetCommandStatusResponse);
  rpc ListRobots(ListRobotsRequest) returns (ListRobotsResponse);
  rpc StreamRobotStates(StreamRobotStatesRequest) returns (stream ListRobotsResponse);
}
